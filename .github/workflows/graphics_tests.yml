name: graphics_tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  test_graphics:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          lfs: true
      - name: Install Micromamba with pygraf environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          cache-downloads: true
          cache-environment: true
      - name: Install dev pkgs
        run: make devenv
        shell: bash -el {0}
      - name: Lint code
        run: make lint
      - name: Test code
        run: make test
